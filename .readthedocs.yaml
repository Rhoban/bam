# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py

# autoapi scans bam/ via AST, so the package itself does not need to be
# installed — only the Sphinx toolchain is required to build the docs.
python:
  install:
    - requirements: docs/requirements.txt
